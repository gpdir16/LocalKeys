<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LocalKeys</title>
        <link rel="stylesheet" href="../styles/common.css" />
        <style>
            /* Dashboard 페이지 스타일 */
            .project-card {
                background-color: var(--bg-secondary);
                padding: 18px 22px;
                border-radius: 8px;
            }

            .projects-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 14px;
                margin-bottom: 20px;
            }

            .project-name {
                font-size: 18px;
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 8px;
            }

            .project-stats {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 15px;
            }

            .secret-count {
                font-size: 14px;
                color: var(--text-secondary);
            }

            .project-date {
                font-size: 12px;
                color: var(--text-secondary);
            }

            /* 통계 카드 */
            .project-card.stat-card {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 16px;
            }

            .stat-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .stat-value {
                font-size: 18px;
                font-weight: 600;
                color: var(--text-primary);
            }

            .stat-value.stat-warning {
                color: var(--warning);
            }

            .stat-value.stat-error {
                color: var(--error);
            }

            .stat-label {
                font-size: 12px;
                color: var(--text-secondary);
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="page-header">
                <div class="page-title-group">
                    <h1 class="page-title" id="page-title">Projects</h1>
                    <!-- 금고 드롭다운 -->
                    <div class="dropdown" id="vault-dropdown">
                        <button class="dropdown-btn" id="vault-dropdown-btn">
                            <span id="vault-dropdown-name">System</span>
                        </button>
                        <div class="dropdown-menu hidden" id="vault-dropdown-menu">
                            <div id="vault-dropdown-list"></div>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item" id="vault-new-btn">
                                <span id="vault-new-label">New Vault</span>
                            </button>
                            <button class="dropdown-item" id="vault-import-btn">
                                <span id="vault-import-label">Import Vault</span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn" id="add-project-btn">Add Project</button>
                    <button class="btn btn-secondary" id="logs-btn">Logs</button>
                    <button class="btn btn-secondary" id="lock-btn">Lock</button>
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" id="settings-dropdown-btn">
                            <span class="lk-icon lk-icon-ellipsis" aria-hidden="true"></span>
                        </button>
                        <div class="dropdown-menu hidden" id="dropdown-settings">
                            <button class="dropdown-item" id="install-cli-btn">Install CLI</button>
                            <button class="dropdown-item" id="settings-btn">Settings</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 검색 바 -->
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search projects..." />
                <span class="search-icon lk-icon lk-icon-search" aria-hidden="true"></span>
            </div>

            <!-- 프로젝트 목록 -->
            <div id="projects-container">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- 프로젝트 추가 모달 -->
        <div id="add-project-modal" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="modal-title">Add New Project</h3>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label for="project-name" id="label-project-name">Project Name</label>
                        <input type="text" id="project-name" placeholder="Enter project name" autocomplete="off" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="cancel-add-project">Cancel</button>
                    <button class="btn" id="confirm-add-project">Add Project</button>
                </div>
            </div>
        </div>

        <!-- 금고 생성 모달 -->
        <div id="vault-create-modal" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="vault-create-title">Create New Vault</h3>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label id="vault-create-name-label">Vault Name</label>
                        <input type="text" id="vault-create-name" placeholder="Enter vault name" autocomplete="off" />
                    </div>
                    <div class="input-group">
                        <label id="vault-create-path-label">Save Location</label>
                        <div class="input-row">
                            <input type="text" id="vault-create-path" placeholder="Select a folder" autocomplete="off" readonly />
                            <button class="btn btn-secondary" id="vault-create-browse">Browse</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label id="vault-create-pw-label">Master Password</label>
                        <input type="password" id="vault-create-password" placeholder="Enter a strong password" autocomplete="new-password" />
                    </div>
                    <div class="input-group">
                        <label id="vault-create-confirm-label">Confirm Password</label>
                        <input type="password" id="vault-create-confirm" placeholder="Re-enter your password" autocomplete="new-password" />
                    </div>
                    <p id="vault-create-error" class="modal-error"></p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="vault-create-cancel">Cancel</button>
                    <button class="btn" id="vault-create-submit">Create Vault</button>
                </div>
            </div>
        </div>

        <!-- 금고 불러오기 모달 -->
        <div id="vault-import-modal" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title" id="vault-import-title">Import Existing Vault</h3>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label id="vault-import-path-label">Vault Location (lkv folder)</label>
                        <div class="input-row">
                            <input type="text" id="vault-import-path" placeholder="Select lkv folder" autocomplete="off" readonly />
                            <button class="btn btn-secondary" id="vault-import-browse">Browse</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label id="vault-import-name-label">Vault Name</label>
                        <input type="text" id="vault-import-name" placeholder="Enter vault name" autocomplete="off" />
                    </div>
                    <div class="input-group">
                        <label id="vault-import-pw-label">Vault Password</label>
                        <input type="password" id="vault-import-password" placeholder="Enter this vault's password" autocomplete="current-password" />
                        <p id="vault-import-pw-desc" class="input-desc"></p>
                    </div>
                    <p id="vault-import-error" class="modal-error"></p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="vault-import-cancel">Cancel</button>
                    <button class="btn" id="vault-import-submit">Import Vault</button>
                </div>
            </div>
        </div>

        <!-- 금고 이름 변경 모달 -->
        <div id="vault-rename-modal" class="modal-overlay hidden">
            <div class="modal modal-sm">
                <div class="modal-header">
                    <h3 class="modal-title" id="vault-rename-title">Rename Vault</h3>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label id="vault-rename-label">New Name</label>
                        <input type="text" id="vault-rename-input" placeholder="Enter new vault name" autocomplete="off" />
                    </div>
                    <p id="vault-rename-error" class="modal-error"></p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="vault-rename-cancel">Cancel</button>
                    <button class="btn" id="vault-rename-submit">Rename</button>
                </div>
            </div>
        </div>

<script src="../modules/i18n-helper.js"></script>
        <script src="../modules/notification.js"></script>
        <script src="../modules/dropdown.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                // 다국어 초기화
                await i18n.init();

                // UI 번역 적용
                document.getElementById("page-title").textContent = i18n.t("dashboard.title");
                document.getElementById("add-project-btn").textContent = i18n.t("dashboard.addProject");
                document.getElementById("logs-btn").textContent = i18n.t("dashboard.logs");
                document.getElementById("lock-btn").textContent = i18n.t("dashboard.lock");
                document.getElementById("install-cli-btn").textContent = i18n.t("dashboard.installCli");
                document.getElementById("settings-btn").textContent = i18n.t("dashboard.settings");
                document.getElementById("search-input").placeholder = i18n.t("dashboard.searchPlaceholder");
                document.getElementById("modal-title").textContent = i18n.t("dashboard.addProjectModal.title");
                document.getElementById("label-project-name").textContent = i18n.t("dashboard.addProjectModal.label");
                document.getElementById("project-name").placeholder = i18n.t("dashboard.addProjectModal.placeholder");
                document.getElementById("cancel-add-project").textContent = i18n.t("common.cancel");
                document.getElementById("confirm-add-project").textContent = i18n.t("dashboard.addProjectModal.add");
                document.getElementById("vault-new-label").textContent = i18n.t("vault.selector.newVault");
                document.getElementById("vault-import-label").textContent = i18n.t("vault.selector.importVault");
                document.getElementById("vault-create-title").textContent = i18n.t("vault.create.title");
                document.getElementById("vault-create-name-label").textContent = i18n.t("vault.create.nameLabel");
                document.getElementById("vault-create-name").placeholder = i18n.t("vault.create.namePlaceholder");
                document.getElementById("vault-create-path-label").textContent = i18n.t("vault.create.pathLabel");
                document.getElementById("vault-create-path").placeholder = i18n.t("vault.create.pathPlaceholder");
                document.getElementById("vault-create-browse").textContent = i18n.t("vault.create.browse");
                document.getElementById("vault-create-pw-label").textContent = i18n.t("vault.create.passwordLabel");
                document.getElementById("vault-create-password").placeholder = i18n.t("vault.create.passwordPlaceholder");
                document.getElementById("vault-create-confirm-label").textContent = i18n.t("vault.create.confirmLabel");
                document.getElementById("vault-create-confirm").placeholder = i18n.t("vault.create.confirmPlaceholder");
                document.getElementById("vault-create-cancel").textContent = i18n.t("common.cancel");
                document.getElementById("vault-create-submit").textContent = i18n.t("vault.create.submit");
                document.getElementById("vault-import-title").textContent = i18n.t("vault.import.title");
                document.getElementById("vault-import-path-label").textContent = i18n.t("vault.import.pathLabel");
                document.getElementById("vault-import-path").placeholder = i18n.t("vault.import.pathPlaceholder");
                document.getElementById("vault-import-browse").textContent = i18n.t("vault.import.browse");
                document.getElementById("vault-import-name-label").textContent = i18n.t("vault.import.nameLabel");
                document.getElementById("vault-import-name").placeholder = i18n.t("vault.import.namePlaceholder");
                document.getElementById("vault-import-pw-label").textContent = i18n.t("vault.import.passwordLabel");
                document.getElementById("vault-import-password").placeholder = i18n.t("vault.import.passwordPlaceholder");
                document.getElementById("vault-import-pw-desc").textContent = i18n.t("vault.import.passwordDesc");
                document.getElementById("vault-import-cancel").textContent = i18n.t("common.cancel");
                document.getElementById("vault-import-submit").textContent = i18n.t("vault.import.submit");
                document.getElementById("vault-rename-title").textContent = i18n.t("vault.rename.title");
                document.getElementById("vault-rename-label").textContent = i18n.t("vault.rename.label");
                document.getElementById("vault-rename-input").placeholder = i18n.t("vault.rename.placeholder");
                document.getElementById("vault-rename-cancel").textContent = i18n.t("common.cancel");
                document.getElementById("vault-rename-submit").textContent = i18n.t("vault.rename.submit");

                const projectsContainer = document.getElementById("projects-container");

                const searchInput = document.getElementById("search-input");

                const addProjectBtn = document.getElementById("add-project-btn");

                const logsBtn = document.getElementById("logs-btn");

                const lockBtn = document.getElementById("lock-btn");

                const installCliBtn = document.getElementById("install-cli-btn");

                const addProjectModal = document.getElementById("add-project-modal");

                const projectNameInput = document.getElementById("project-name");

                const cancelAddProject = document.getElementById("cancel-add-project");

                const confirmAddProject = document.getElementById("confirm-add-project");

                const settingsDropdownBtn = document.getElementById("settings-dropdown-btn");

                const settingsBtn = document.getElementById("settings-btn");

                let projects = [];

                let filteredProjects = [];

                let favorites = { projects: [], secrets: Object.create(null) };

                let statistics = null;

                let showStatistics = true;

                let settingsWarningShown = false;

                // 통계 로드
                async function loadStatistics() {
                    try {
                        const settings = await window.localkeys.settings.get();
                        if (!settingsWarningShown) {
                            if (settings.__loadStatus === "reset") {
                                settingsWarningShown = true;
                                notificationManager.error(i18n.t("settings.notifications.resetDueToError"));
                            } else if (settings.__loadStatus === "repaired") {
                                settingsWarningShown = true;
                                notificationManager.success(i18n.t("settings.notifications.repaired"));
                            }
                        }
                        showStatistics = settings.showStatistics !== false;

                        if (!showStatistics) {
                            statistics = null;
                            return;
                        }

                        const result = await window.localkeys.statistics.get();
                        if (result.success) {
                            statistics = result.data;
                        }
                    } catch (error) {
                        console.error("Failed to load statistics:", error);
                    }
                }

                // 즐겨찾기 로드
                async function loadFavorites() {
                    try {
                        const result = await window.localkeys.favorites.get();
                        if (result.success) {
                            favorites = result.data;
                        }
                    } catch (error) {
                        console.error("Failed to load favorites:", error);
                    }
                }

                // 프로젝트 로드

                async function loadProjects() {
                    try {
                        await loadFavorites();
                        await loadStatistics();

                        const result = await window.localkeys.projects.get();

                        if (result.success) {
                            projects = result.data;

                            applyFilter();
                        } else {
                            notificationManager.error(i18n.t("dashboard.notifications.failedToLoad"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("dashboard.notifications.failedToLoad"));
                    }
                }

                // 필터 및 정렬 적용
                function applyFilter() {
                    let filtered = [...projects];

                    // 검색 필터
                    const query = searchInput.value.toLowerCase().trim();
                    if (query) {
                        filtered = filtered.filter((p) => p.name.toLowerCase().includes(query));
                    }

                    // 즐겨찾기 항목을 위로 정렬
                    filtered.sort((a, b) => {
                        const aFav = favorites.projects.includes(a.name);
                        const bFav = favorites.projects.includes(b.name);
                        if (aFav && !bFav) return -1;
                        if (!aFav && bFav) return 1;
                        return 0;
                    });

                    filteredProjects = filtered;
                    renderProjects();
                }

                function createProjectCard(project) {
                    const card = document.createElement("div");

                    card.className = "project-card";

                    card.onclick = () => openProject(project.name);

                    const nameDiv = document.createElement("div");

                    nameDiv.className = "project-name";

                    nameDiv.style.display = "flex";
                    nameDiv.style.alignItems = "center";
                    nameDiv.style.gap = "8px";

                    const nameText = document.createElement("span");
                    nameText.textContent = project.name;
                    nameDiv.appendChild(nameText);

                    // 즐겨찾기 아이콘
                    const isFavorite = favorites.projects.includes(project.name);
                    const favoriteBtn = document.createElement("button");
                    favoriteBtn.className = "btn-icon-small";
                    favoriteBtn.type = "button";
                    favoriteBtn.textContent = isFavorite ? "★" : "☆";
                    favoriteBtn.style.fontSize = "16px";
                    favoriteBtn.style.color = isFavorite ? "var(--accent)" : "var(--text-secondary)";
                    const favoriteLabel = isFavorite ? i18n.t("project.removeFromFavorites") : i18n.t("project.addToFavorites");
                    favoriteBtn.setAttribute("aria-label", favoriteLabel);
                    favoriteBtn.setAttribute("title", favoriteLabel);
                    favoriteBtn.setAttribute("aria-pressed", isFavorite ? "true" : "false");
                    favoriteBtn.onclick = async (e) => {
                        e.stopPropagation();
                        await toggleProjectFavorite(project.name);
                    };
                    nameDiv.appendChild(favoriteBtn);

                    const dateDiv = document.createElement("div");

                    dateDiv.className = "project-date";

                    dateDiv.textContent = i18n.t("dashboard.updated", { time: formatDate(project.updatedAt) });

                    const statsDiv = document.createElement("div");

                    statsDiv.className = "project-stats";

                    const secretCountDiv = document.createElement("div");

                    secretCountDiv.className = "secret-count";

                    secretCountDiv.textContent = i18n.t("dashboard.secretCount", { count: project.secretCount });

                    const actionsDiv = document.createElement("div");

                    actionsDiv.className = "project-actions";

                    const dropdownDiv = document.createElement("div");

                    dropdownDiv.className = "dropdown";

                    const dropdownBtn = document.createElement("button");

                    dropdownBtn.className = "btn btn-secondary dropdown-toggle";

                    const ellipsisIcon = document.createElement("span");
                    ellipsisIcon.className = "lk-icon lk-icon-ellipsis";
                    ellipsisIcon.setAttribute("aria-hidden", "true");
                    dropdownBtn.appendChild(ellipsisIcon);

                    dropdownBtn.onclick = (e) => {
                        e.stopPropagation();
                        dropdownManager.toggle(dropdownMenu);
                    };

                    const dropdownMenu = document.createElement("div");

                    dropdownMenu.className = "dropdown-menu hidden";

                    const deleteBtn = document.createElement("button");

                    deleteBtn.className = "dropdown-item";

                    deleteBtn.textContent = i18n.t("dashboard.deleteProject.deleteBtn");

                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();

                        deleteProject(project.name);
                    };

                    dropdownMenu.appendChild(deleteBtn);

                    dropdownDiv.appendChild(dropdownBtn);

                    dropdownDiv.appendChild(dropdownMenu);

                    actionsDiv.appendChild(dropdownDiv);

                    statsDiv.appendChild(secretCountDiv);

                    statsDiv.appendChild(actionsDiv);

                    card.appendChild(nameDiv);

                    card.appendChild(dateDiv);

                    card.appendChild(statsDiv);

                    return card;
                }

                function createEmptyStateElement() {
                    const emptyState = document.createElement("div");

                    emptyState.className = "empty-state";

                    const icon = document.createElement("div");

                    icon.className = "empty-state-icon";

                    icon.classList.add("lk-icon", "lk-icon-folder", "lk-icon-xl");
                    icon.setAttribute("aria-hidden", "true");

                    const title = document.createElement("div");

                    title.className = "empty-state-title";

                    title.textContent = i18n.t("dashboard.emptyState.title");

                    const description = document.createElement("div");

                    description.className = "empty-state-description";

                    description.textContent = projects.length === 0 ? i18n.t("dashboard.emptyState.descriptionEmpty") : i18n.t("dashboard.emptyState.descriptionSearch");

                    emptyState.appendChild(icon);

                    emptyState.appendChild(title);

                    emptyState.appendChild(description);

                    return emptyState;
                }

                // 통계 카드 생성
                function createStatCard() {
                    if (!statistics) return null;

                    const card = document.createElement("div");
                    card.className = "project-card stat-card";

                    // 만료된 것이 포함된 경우 레이블 변경
                    const expiringLabel = statistics.hasExpired ? i18n.t("dashboard.statistics.expiringAndExpired") : i18n.t("dashboard.statistics.expiringSecrets");

                    // 만료 상태에 따른 색상 결정
                    let expiringColorClass = "";
                    if (statistics.expiringSecrets > 0) {
                        expiringColorClass = statistics.hasExpired ? " stat-error" : " stat-warning";
                    }

                    const items = [
                        { value: statistics.totalProjects, label: i18n.t("dashboard.statistics.totalProjects"), colorClass: "" },
                        { value: statistics.totalSecrets, label: i18n.t("dashboard.statistics.totalSecrets"), colorClass: "" },
                        { value: statistics.expiringSecrets, label: expiringLabel, colorClass: expiringColorClass },
                        { value: statistics.recentAccessCount, label: i18n.t("dashboard.statistics.recentAccess"), colorClass: "" },
                    ];

                    items.forEach((item) => {
                        const itemDiv = document.createElement("div");
                        itemDiv.className = "stat-item";

                        const valueDiv = document.createElement("div");
                        valueDiv.className = "stat-value" + item.colorClass;
                        valueDiv.textContent = item.value;

                        const labelDiv = document.createElement("div");
                        labelDiv.className = "stat-label";
                        labelDiv.textContent = item.label;

                        itemDiv.appendChild(valueDiv);
                        itemDiv.appendChild(labelDiv);
                        card.appendChild(itemDiv);
                    });

                    return card;
                }

                // 프로젝트 렌더링

                function renderProjects() {
                    projectsContainer.innerHTML = "";

                    if (filteredProjects.length === 0) {
                        projectsContainer.appendChild(createEmptyStateElement());
                        return;
                    }

                    const grid = document.createElement("div");
                    grid.className = "projects-grid";

                    // 통계 카드를 먼저 추가 (프로젝트가 있을 때만)
                    if (showStatistics && statistics && projects.length > 0) {
                        const statCard = createStatCard();
                        if (statCard) {
                            grid.appendChild(statCard);
                        }
                    }

                    // 프로젝트 카드 추가
                    filteredProjects.forEach((project) => {
                        grid.appendChild(createProjectCard(project));
                    });

                    projectsContainer.appendChild(grid);
                }

                // 프로젝트 열기

                function openProject(projectName) {
                    window.location.href = `project.html?name=${encodeURIComponent(projectName)}`;
                }

                // 프로젝트 삭제

                async function deleteProject(projectName) {
                    if (!confirm(i18n.t("dashboard.deleteProject.confirm", { name: projectName }))) {
                        return;
                    }

                    try {
                        const result = await window.localkeys.projects.delete(projectName);

                        if (result.success) {
                            await loadProjects();

                            notificationManager.success(i18n.t("dashboard.notifications.projectDeleted", { name: projectName }));
                        } else {
                            notificationManager.error(i18n.t("dashboard.notifications.failedToDelete"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("dashboard.notifications.failedToDelete"));
                    }
                }

                // 프로젝트 추가 모달 표시

                function showAddProjectModal() {
                    projectNameInput.value = "";
                    showModal("add-project-modal");
                    projectNameInput.focus();
                }

                function hideAddProjectModal() {
                    hideModal("add-project-modal");
                }

                // 프로젝트 추가

                async function addProject() {
                    const projectName = projectNameInput.value.trim();

                    if (!projectName) {
                        notificationManager.error(i18n.t("dashboard.notifications.enterName"));

                        return;
                    }

                    if (projects.some((p) => p.name === projectName)) {
                        notificationManager.error(i18n.t("dashboard.notifications.projectExists"));

                        return;
                    }

                    try {
                        const result = await window.localkeys.projects.create(projectName);

                        if (result.success) {
                            hideAddProjectModal();

                            await loadProjects();

                            notificationManager.success(i18n.t("dashboard.notifications.projectCreated", { name: projectName }));
                        } else {
                            notificationManager.error(i18n.t("dashboard.notifications.failedToCreate"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("dashboard.notifications.failedToCreate"));
                    }
                }

                // 즐겨찾기 토글
                async function toggleProjectFavorite(projectName) {
                    try {
                        const result = await window.localkeys.favorite.toggleProject(projectName);
                        if (result.success) {
                            await loadFavorites();
                            applyFilter();
                            const message = result.added ? i18n.t("dashboard.notifications.favoriteAdded") : i18n.t("dashboard.notifications.favoriteRemoved");
                            notificationManager.success(message);
                        }
                    } catch (error) {
                        console.error("Failed to toggle favorite:", error);
                    }
                }

                // 검색

                function searchProjects() {
                    applyFilter();
                }

                function formatDate(dateString) {
                    const date = new Date(dateString);

                    const now = new Date();

                    const diffMs = now - date;

                    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

                    if (diffDays === 0) {
                        return i18n.t("dashboard.time.today");
                    } else if (diffDays === 1) {
                        return i18n.t("dashboard.time.yesterday");
                    } else if (diffDays < 7) {
                        return i18n.t("dashboard.time.daysAgo", { count: diffDays });
                    } else if (diffDays < 30) {
                        return i18n.t("dashboard.time.weeksAgo", { count: Math.floor(diffDays / 7) });
                    } else {
                        return date.toLocaleDateString();
                    }
                }

                // 이벤트 리스너

                searchInput.addEventListener("input", searchProjects);

                addProjectBtn.addEventListener("click", showAddProjectModal);

                settingsDropdownBtn.addEventListener("click", () => dropdownManager.toggle(document.getElementById("dropdown-settings")));

                logsBtn.addEventListener("click", function () {
                    window.location.href = "logs.html";
                });

                settingsBtn.addEventListener("click", function () {
                    window.location.href = "settings.html";
                });

                lockBtn.addEventListener("click", async function () {
                    try {
                        await window.localkeys.vault.lock();
                    } catch (error) {
                        notificationManager.error(i18n.t("dashboard.notifications.lockError", { error: error.message }));
                    }
                });

                cancelAddProject.addEventListener("click", hideAddProjectModal);

                confirmAddProject.addEventListener("click", addProject);

                projectNameInput.addEventListener("keypress", function (e) {
                    if (e.key === "Enter") {
                        addProject();
                    }
                });

                // 모달 외부 클릭 감지를 위한 변수

                let mouseDownTarget = null;

                // 마우스 다운 이벤트 추적

                document.addEventListener("mousedown", function (e) {
                    mouseDownTarget = e.target;
                });

                addProjectModal.addEventListener("click", function (e) {
                    // 클릭 시작과 끝 모두 모달 오버레이인 경우에만 닫기

                    if (mouseDownTarget === addProjectModal && e.target === addProjectModal) {
                        hideAddProjectModal();
                    }
                });

                // 마우스 업 이벤트 추적 - 클릭 해제도 밖에서 해야 함

                document.addEventListener("mouseup", function (e) {
                    // 클릭 시작이 모달 오버레이였지만 클릭 해제가 모달 외부인 경우 모달 닫기

                    if (mouseDownTarget === addProjectModal && e.target !== addProjectModal) {
                        mouseDownTarget = null; // 초기화

                        return;
                    }
                });


                // 자동 새로고침 설정 (10초마다)

                const autoRefreshInterval = setInterval(async () => {
                    if (document.visibilityState === "visible") {
                        await loadProjects();
                    }
                }, 10000);

                // 페이지가 보이지 않을 때는 자동 새로고침 중지

                document.addEventListener("visibilitychange", () => {
                    if (document.visibilityState === "hidden") {
                        clearInterval(autoRefreshInterval);
                    }
                });

                // CLI 버튼 상태 관리

                const setCliButtonState = (text, disabled, opacity, onclick) => {
                    installCliBtn.textContent = text;

                    installCliBtn.disabled = disabled;

                    installCliBtn.style.opacity = opacity;

                    installCliBtn.onclick = onclick;
                };

                // CLI 작업 처리 (설치/제거)

                async function handleCliAction(action) {
                    try {
                        const isInstalling = action === "install";

                        const loadingText = isInstalling ? i18n.t("dashboard.installing") : i18n.t("dashboard.uninstalling");

                        const apiMethod = isInstalling ? window.localkeys.cli.install : window.localkeys.cli.uninstall;

                        const successPrefix = isInstalling ? "installation" : "uninstallation";

                        setCliButtonState(loadingText, true, "0.6", null);

                        const result = await apiMethod();

                        if (result.success) {
                            notificationManager.success(result.message);

                            await checkCliStatus();
                        } else {
                            notificationManager.error(result.error);

                            setCliButtonState(isInstalling ? i18n.t("dashboard.installCli") : i18n.t("dashboard.uninstallCli"), false, "1", isInstalling ? installCli : uninstallCli);
                        }
                    } catch (error) {
                        const actionName = action === "install" ? "installation" : "uninstallation";

                        notificationManager.error(i18n.t("dashboard.notifications.cliInstallFailed", { action: actionName, error: error.message }));

                        setCliButtonState(action === "install" ? i18n.t("dashboard.installCli") : i18n.t("dashboard.uninstallCli"), false, "1", action === "install" ? installCli : uninstallCli);
                    }
                }

                // CLI 설치 상태 확인

                async function checkCliStatus() {
                    try {
                        const result = await window.localkeys.cli.check();

                        if (result.installed) {
                            setCliButtonState(i18n.t("dashboard.uninstallCli"), false, "1", () => handleCliAction("uninstall"));
                        } else {
                            setCliButtonState(i18n.t("dashboard.installCli"), false, "1", () => handleCliAction("install"));
                        }
                    } catch (error) {
                        setCliButtonState(i18n.t("dashboard.installCli"), false, "1", () => handleCliAction("install"));
                    }
                }

                // CLI 설치 함수

                const installCli = () => handleCliAction("install");

                // CLI 제거 함수

                const uninstallCli = () => {
                    if (confirm(i18n.t("dashboard.confirmUninstallCli"))) {
                        handleCliAction("uninstall");
                    }
                };

                // ===== 금고 선택기 =====

                // 모달 헬퍼
                function showModal(id) {
                    const el = document.getElementById(id);
                    el.classList.remove("hidden");
                    requestAnimationFrame(() => el.classList.add("show"));
                }
                function hideModal(id) {
                    const el = document.getElementById(id);
                    el.classList.remove("show");
                    el.classList.add("closing");
                    setTimeout(() => {
                        el.classList.add("hidden");
                        el.classList.remove("closing");
                    }, 250);
                }

                // 금고 목록 드롭다운 렌더링
                async function renderVaultDropdown() {
                    const result = await window.localkeys.vault.list();
                    if (!result.success) return null;

                    const vaults = result.data;
                    const list = document.getElementById("vault-dropdown-list");
                    list.innerHTML = "";

                    const active = vaults.find(v => v.isActive) || vaults.find(v => v.id === "system") || vaults[0];
                    if (active) {
                        document.getElementById("vault-dropdown-name").textContent = active.name;
                    }

                    vaults.forEach(vault => {
                        const item = document.createElement("button");
                        item.className = "dropdown-item" + (vault.isActive ? " active" : "") + (vault.status === "offline" ? " offline" : "");

                        const left = document.createElement("div");
                        left.className = "dropdown-item-left";

                        if (vault.status === "offline") {
                            const icon = document.createElement("span");
                            icon.className = "lk-icon dropdown-item-icon lk-icon-circle-alert status-offline";
                            left.appendChild(icon);
                        }

                        const name = document.createElement("span");
                        name.className = "dropdown-item-name" + (vault.isActive ? " active" : "");
                        name.textContent = vault.name;
                        left.appendChild(name);

                        item.appendChild(left);

                        // 컨텍스트 버튼 (System 금고 제외)
                        if (!vault.isSystem) {
                            const dropdownContainer = document.createElement("div");
                            dropdownContainer.className = "dropdown";

                            const ctxBtn = document.createElement("button");
                            ctxBtn.className = "dropdown-item-context-btn";
                            const ctxIcon = document.createElement("span");
                            ctxIcon.className = "lk-icon lk-icon-sm lk-icon-ellipsis";
                            ctxBtn.appendChild(ctxIcon);

                            const ctxMenu = document.createElement("div");
                            ctxMenu.className = "dropdown-menu hidden vault-context-menu";

                            const renameBtn = document.createElement("button");
                            renameBtn.className = "dropdown-item";
                            renameBtn.textContent = i18n.t("vault.context.rename");
                            renameBtn.onclick = (e) => {
                                e.stopPropagation();
                                dropdownManager.closeAll();
                                showVaultRenameModal(vault);
                            };

                            const removeBtn = document.createElement("button");
                            removeBtn.className = "dropdown-item";
                            removeBtn.textContent = i18n.t("vault.context.remove");
                            removeBtn.onclick = (e) => {
                                e.stopPropagation();
                                dropdownManager.closeAll();
                                handleVaultRemove(vault);
                            };

                            ctxMenu.appendChild(renameBtn);
                            ctxMenu.appendChild(removeBtn);

                            ctxBtn.onclick = (e) => {
                                e.stopPropagation();
                                dropdownManager.toggle(ctxMenu);
                            };

                            dropdownContainer.appendChild(ctxBtn);
                            dropdownContainer.appendChild(ctxMenu);
                            item.appendChild(dropdownContainer);
                        }

                        if (vault.status !== "offline") {
                            item.onclick = () => handleVaultSelect(vault);
                        }

                        list.appendChild(item);
                    });

                    return vaults;
                }

                // 금고 선택 처리 (새 구조: 모두 잠금 해제 상태이므로 비밀번호 불필요)
                async function handleVaultSelect(vault) {
                    closeVaultDropdown();
                    if (vault.isActive) return;

                    if (vault.status === "offline") {
                        notificationManager.error(i18n.t("vault.notifications.offlineVault"));
                        return;
                    }

                    await doSwitchVault(vault.id);
                }

                async function doSwitchVault(vaultId) {
                    try {
                        const result = await window.localkeys.vault.switch(vaultId);
                        if (result.success) {
                            const vaultList = await renderVaultDropdown();
                            await loadProjects();
                            const switched = vaultList?.find(v => v.id === vaultId);
                            if (switched) notificationManager.success(i18n.t("vault.notifications.switched", { name: switched.name }));
                        } else {
                            notificationManager.error(result.error || i18n.t("vault.notifications.failedToSwitch"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("vault.notifications.failedToSwitch"));
                    }
                }

                // 금고 드롭다운 토글
                const vaultDropdownBtn = document.getElementById("vault-dropdown-btn");
                const vaultDropdownMenu = document.getElementById("vault-dropdown-menu");

                vaultDropdownBtn.addEventListener("click", async (e) => {
                    e.stopPropagation();
                    const isHidden = vaultDropdownMenu.classList.contains("hidden");
                    closeVaultDropdown();
                    if (isHidden) {
                        await renderVaultDropdown();
                        vaultDropdownMenu.classList.remove("hidden");
                    }
                });

                function closeVaultDropdown() {
                    vaultDropdownMenu.classList.add("hidden");
                }

                // 새 금고 생성
                document.getElementById("vault-new-btn").addEventListener("click", () => {
                    closeVaultDropdown();
                    document.getElementById("vault-create-name").value = "";
                    document.getElementById("vault-create-path").value = "";
                    document.getElementById("vault-create-password").value = "";
                    document.getElementById("vault-create-confirm").value = "";
                    document.getElementById("vault-create-error").style.display = "none";
                    showModal("vault-create-modal");
                    setTimeout(() => document.getElementById("vault-create-name").focus(), 100);
                });

                document.getElementById("vault-create-browse").addEventListener("click", async () => {
                    const result = await window.localkeys.dialog.selectFolder();
                    if (result.success && result.data) {
                        document.getElementById("vault-create-path").value = result.data;
                    }
                });

                document.getElementById("vault-create-cancel").addEventListener("click", () => hideModal("vault-create-modal"));

                document.getElementById("vault-create-submit").addEventListener("click", async () => {
                    const name = document.getElementById("vault-create-name").value.trim();
                    const folderPath = document.getElementById("vault-create-path").value.trim();
                    const password = document.getElementById("vault-create-password").value;
                    const confirm = document.getElementById("vault-create-confirm").value;
                    const errorEl = document.getElementById("vault-create-error");

                    if (!name) { errorEl.textContent = i18n.t("vault.notifications.nameRequired"); errorEl.style.display = ""; return; }
                    if (!folderPath) { errorEl.textContent = i18n.t("vault.notifications.pathRequired"); errorEl.style.display = ""; return; }
                    if (password !== confirm) { errorEl.textContent = i18n.t("vault.notifications.passwordMismatch"); errorEl.style.display = ""; return; }
                    errorEl.style.display = "none";

                    const btn = document.getElementById("vault-create-submit");
                    btn.textContent = i18n.t("vault.create.creating");
                    btn.disabled = true;

                    const result = await window.localkeys.vault.create(name, folderPath, password);
                    btn.textContent = i18n.t("vault.create.submit");
                    btn.disabled = false;

                    if (result.success) {
                        hideModal("vault-create-modal");
                        await renderVaultDropdown();
                        notificationManager.success(i18n.t("vault.notifications.created", { name }));
                    } else {
                        errorEl.textContent = result.error || i18n.t("vault.notifications.failedToCreate");
                        errorEl.style.display = "";
                    }
                });

                // 기존 금고 불러오기
                document.getElementById("vault-import-btn").addEventListener("click", () => {
                    closeVaultDropdown();
                    document.getElementById("vault-import-path").value = "";
                    document.getElementById("vault-import-name").value = "";
                    document.getElementById("vault-import-password").value = "";
                    document.getElementById("vault-import-error").style.display = "none";
                    showModal("vault-import-modal");
                });

                document.getElementById("vault-import-browse").addEventListener("click", async () => {
                    const result = await window.localkeys.dialog.selectFolder();
                    if (result.success && result.data) {
                        document.getElementById("vault-import-path").value = result.data;
                        // 이름 자동 완성 (폴더명 사용)
                        const nameInput = document.getElementById("vault-import-name");
                        if (!nameInput.value) {
                            const parts = result.data.split(/[\/\\]/);
                            const folderName = parts[parts.length - 1];
                            if (folderName && folderName !== "lkv") {
                                nameInput.value = folderName;
                            }
                        }
                    }
                });

                document.getElementById("vault-import-cancel").addEventListener("click", () => hideModal("vault-import-modal"));

                document.getElementById("vault-import-submit").addEventListener("click", async () => {
                    const lkvPath = document.getElementById("vault-import-path").value.trim();
                    const name = document.getElementById("vault-import-name").value.trim();
                    const password = document.getElementById("vault-import-password").value;
                    const errorEl = document.getElementById("vault-import-error");

                    if (!lkvPath) { errorEl.textContent = i18n.t("vault.notifications.pathRequired"); errorEl.style.display = ""; return; }
                    if (!name) { errorEl.textContent = i18n.t("vault.notifications.nameRequired"); errorEl.style.display = ""; return; }
                    if (!password) { errorEl.textContent = i18n.t("vault.notifications.passwordRequired"); errorEl.style.display = ""; return; }
                    errorEl.style.display = "none";

                    const btn = document.getElementById("vault-import-submit");
                    btn.textContent = i18n.t("vault.import.importing");
                    btn.disabled = true;

                    const result = await window.localkeys.vault.import(name, lkvPath, password);
                    btn.textContent = i18n.t("vault.import.submit");
                    btn.disabled = false;

                    if (result.success) {
                        hideModal("vault-import-modal");
                        await renderVaultDropdown();
                        notificationManager.success(i18n.t("vault.notifications.imported", { name }));
                    } else {
                        errorEl.textContent = result.error || i18n.t("vault.notifications.failedToImport");
                        errorEl.style.display = "";
                    }
                });

                // 금고 이름 변경
                let renamingVaultId = null;
                function showVaultRenameModal(vault) {
                    renamingVaultId = vault.id;
                    document.getElementById("vault-rename-input").value = vault.name;
                    document.getElementById("vault-rename-error").style.display = "none";
                    showModal("vault-rename-modal");
                    setTimeout(() => document.getElementById("vault-rename-input").select(), 100);
                }

                document.getElementById("vault-rename-cancel").addEventListener("click", () => hideModal("vault-rename-modal"));

                document.getElementById("vault-rename-submit").addEventListener("click", async () => {
                    const newName = document.getElementById("vault-rename-input").value.trim();
                    const errorEl = document.getElementById("vault-rename-error");
                    if (!newName) { errorEl.textContent = i18n.t("vault.notifications.nameRequired"); errorEl.style.display = ""; return; }

                    const result = await window.localkeys.vault.rename(renamingVaultId, newName);
                    if (result.success) {
                        hideModal("vault-rename-modal");
                        await renderVaultDropdown();
                        notificationManager.success(i18n.t("vault.notifications.renamed", { name: newName }));
                    } else {
                        errorEl.textContent = result.error || i18n.t("vault.notifications.failedToRename");
                        errorEl.style.display = "";
                    }
                });

                document.getElementById("vault-rename-input").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") document.getElementById("vault-rename-submit").click();
                });

                // 금고 제거
                async function handleVaultRemove(vault) {
                    if (!confirm(i18n.t("vault.remove.confirm", { name: vault.name }))) return;
                    const result = await window.localkeys.vault.remove(vault.id);
                    if (result.success) {
                        await renderVaultDropdown();
                        await loadProjects();
                        notificationManager.success(i18n.t("vault.notifications.removed", { name: vault.name }));
                    } else {
                        notificationManager.error(result.error || i18n.t("vault.notifications.failedToRemove"));
                    }
                }

                // 모달 외부 클릭으로 닫기 (vault 모달들)
                ["vault-create-modal", "vault-import-modal", "vault-rename-modal"].forEach(id => {
                    const overlay = document.getElementById(id);
                    overlay.addEventListener("click", (e) => {
                        if (mouseDownTarget === overlay && e.target === overlay) hideModal(id);
                    });
                });

                // 초기 금고 선택기 로드
                renderVaultDropdown();

                // 초기 로드

                loadProjects();

                checkCliStatus();
            });
        </script>
    </body>
</html>
