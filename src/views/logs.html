<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LocalKeys</title>
        <link rel="stylesheet" href="../styles/common.css" />
        <style>
            /* Logs 페이지 스타일 */
            .logs-container {
                overflow-y: auto;
            }

            .log-item {
                padding: 15px 20px;
                border-radius: 8px;
            }

            .log-item:hover {
                background-color: var(--bg-secondary);
            }

            .log-item:last-child {
                border-bottom: none;
            }

            .log-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 8px;
            }

            .log-timestamp {
                font-size: 12px;
                color: var(--text-secondary);
                font-family: "Courier New", monospace;
            }

            .log-type {
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: 500;
                text-transform: uppercase;
            }

            .log-type.info {
                background-color: rgba(74, 158, 255, 0.2);
                color: var(--accent);
            }

            .log-type.access {
                background: rgba(76, 175, 80, 0.2);
                color: var(--success);
            }

            .log-type.app {
                background: rgba(158, 158, 158, 0.2);
                color: #9e9e9e;
            }

            .log-type.lock {
                background: rgba(255, 152, 0, 0.2);
                color: #ff9800;
            }

            .log-type.warning {
                background-color: rgba(255, 152, 0, 0.2);
                color: var(--warning);
            }

            .log-type.error {
                background-color: rgba(244, 67, 54, 0.2);
                color: var(--error);
            }

            .log-message {
                font-size: 14px;
                color: var(--text-primary);
                line-height: 1.4;
                word-break: break-word;
            }

            .logs-filters {
                display: flex;
                gap: 14px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="page-header">
                <div class="page-title">
                    <button class="back-btn" id="back-btn">
                        <span class="lk-icon lk-icon-arrow-left" aria-hidden="true"></span>
                    </button>
                    <span id="title">Access Logs</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" id="export-logs-btn">Export</button>
                    <button class="btn btn-danger" id="clear-logs-btn">Clear All Logs</button>
                </div>
            </div>

            <!-- 필터 및 검색 -->
            <div class="logs-filters">
                <select id="category-filter" class="btn btn-secondary filter-select">
                    <option value="all">All</option>
                    <option value="access">Access</option>
                    <option value="app">App</option>
                    <option value="lock">Lock</option>
                </select>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search logs..." />
                    <span class="search-icon lk-icon lk-icon-search" aria-hidden="true"></span>
                </div>
            </div>

            <!-- 로그 목록 -->
            <div class="logs-container" id="logs-container">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <script src="../modules/i18n-helper.js"></script>
        <script src="../modules/notification.js"></script>
        <script src="../modules/list-sync.js"></script>
        <script src="../modules/vault-merge-ui.js"></script>
        <script src="../modules/vault-external-change.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", async function () {
                // 다국어 초기화
                await i18n.init();

                // UI 번역 적용
                document.getElementById("title").textContent = i18n.t("logs.title");
                document.getElementById("clear-logs-btn").textContent = i18n.t("logs.clearAll");
                document.getElementById("export-logs-btn").textContent = i18n.t("logs.export");
                document.getElementById("search-input").placeholder = i18n.t("logs.searchPlaceholder");
                const logsContainer = document.getElementById("logs-container");
                const backBtn = document.getElementById("back-btn");
                const clearLogsBtn = document.getElementById("clear-logs-btn");
                const exportLogsBtn = document.getElementById("export-logs-btn");
                const categoryFilter = document.getElementById("category-filter");
                const searchInput = document.getElementById("search-input");

                // 카테고리 옵션 번역
                try {
                    categoryFilter.querySelector('option[value="all"]').textContent = i18n.t("logs.categories.all");
                    categoryFilter.querySelector('option[value="access"]').textContent = i18n.t("logs.categories.access");
                    categoryFilter.querySelector('option[value="app"]').textContent = i18n.t("logs.categories.app");
                    categoryFilter.querySelector('option[value="lock"]').textContent = i18n.t("logs.categories.lock");
                } catch {}

                let allLogs = [];
                let filteredLogs = [];
                let displayedLogsCount = 0;
                const logsPerLoad = 50;
                let isLoading = false;
                let hasMoreLogs = true;
                let currentCategory = "all";
                let currentSearch = "";

                function logKey(log) {
                    return encodeURIComponent([log.timestamp, log.category, log.message].join("\0"));
                }

                // 로그 로드
                async function loadLogs(options) {
                    const preserveView = options && options.preserveView === true;
                    try {
                        const result = await window.localkeys.logs.get();

                        if (result.success) {
                            allLogs = result.data.reverse(); // 최신 로그부터 표시
                            if (!preserveView) {
                                displayedLogsCount = 0;
                                hasMoreLogs = true;
                            }
                            applyFilters({ preserveScroll: preserveView });
                        } else {
                            notificationManager.error(i18n.t("logs.notifications.failedToLoad"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("logs.notifications.failedToLoad"));
                    }
                }

                // 필터 적용
                function applyFilters(opts) {
                    filteredLogs = allLogs.filter((log) => {
                        if (currentCategory !== "all" && log.category !== currentCategory) {
                            return false;
                        }

                        if (currentSearch && !log.message.toLowerCase().includes(currentSearch.toLowerCase())) {
                            return false;
                        }

                        return true;
                    });

                    renderLogs({ preserveScroll: opts && opts.preserveScroll === true });
                }

                function syncLogSlice() {
                    const slice = filteredLogs.slice(0, displayedLogsCount);
                    syncListByKey(logsContainer, slice, {
                        getKey: logKey,
                        create: createLogElement,
                        update: updateLogElement,
                    });
                }

                // 추가 로그 로드 (무한 스크롤)
                function loadMoreLogs() {
                    if (isLoading || !hasMoreLogs) return;

                    isLoading = true;

                    setTimeout(() => {
                        const startIndex = displayedLogsCount;
                        const endIndex = Math.min(startIndex + logsPerLoad, filteredLogs.length);

                        if (startIndex >= filteredLogs.length) {
                            hasMoreLogs = false;
                            isLoading = false;
                            return;
                        }

                        logsContainer.querySelector(".loading")?.remove();

                        displayedLogsCount = endIndex;
                        hasMoreLogs = endIndex < filteredLogs.length;
                        syncLogSlice();
                        isLoading = false;
                    }, 100);
                }

                function createLogElement(log) {
                    const logItem = document.createElement("div");
                    logItem.className = "log-item";

                    const logHeader = document.createElement("div");
                    logHeader.className = "log-header";

                    const timestampDiv = document.createElement("div");
                    timestampDiv.className = "log-timestamp";

                    const typeDiv = document.createElement("div");
                    typeDiv.className = `log-type ${log.category}`;

                    logHeader.appendChild(timestampDiv);
                    logHeader.appendChild(typeDiv);

                    const messageDiv = document.createElement("div");
                    messageDiv.className = "log-message";

                    logItem.appendChild(logHeader);
                    logItem.appendChild(messageDiv);

                    updateLogElement(logItem, log);
                    return logItem;
                }

                function updateLogElement(logItem, log) {
                    const timestampDiv = logItem.querySelector(".log-timestamp");
                    const typeDiv = logItem.querySelector(".log-type");
                    const messageDiv = logItem.querySelector(".log-message");
                    if (timestampDiv) timestampDiv.textContent = formatTimestamp(log.timestamp);
                    if (typeDiv) {
                        typeDiv.className = `log-type ${log.category}`;
                        const categoryLabelKey = `logs.categories.${log.category}`;
                        const categoryLabel = i18n.t(categoryLabelKey);
                        typeDiv.textContent = categoryLabel === categoryLabelKey ? log.category : categoryLabel;
                    }
                    if (messageDiv) messageDiv.textContent = log.message;
                }

                function appendLogsEmptyState() {
                    const emptyState = document.createElement("div");
                    emptyState.className = "empty-state";

                    const icon = document.createElement("div");
                    icon.className = "empty-state-icon lk-icon lk-icon-clipboard lk-icon-xl";
                    icon.setAttribute("aria-hidden", "true");

                    const title = document.createElement("div");
                    title.className = "empty-state-title";

                    const description = document.createElement("div");
                    description.className = "empty-state-description";

                    emptyState.appendChild(icon);
                    emptyState.appendChild(title);
                    emptyState.appendChild(description);
                    logsContainer.appendChild(emptyState);
                    return emptyState;
                }

                // 로그 렌더링
                function renderLogs(opts) {
                    const preserve = opts && opts.preserveScroll === true;
                    logsContainer.querySelector(".loading")?.remove();

                    if (filteredLogs.length === 0) {
                        syncListByKey(logsContainer, [], {
                            getKey: logKey,
                            create: createLogElement,
                            update: updateLogElement,
                        });
                        displayedLogsCount = 0;
                        hasMoreLogs = false;

                        let empty = logsContainer.querySelector(".empty-state");
                        if (!empty) {
                            empty = appendLogsEmptyState();
                        }
                        const title = empty.querySelector(".empty-state-title");
                        const description = empty.querySelector(".empty-state-description");
                        if (allLogs.length === 0) {
                            if (title) title.textContent = i18n.t("logs.emptyState.title");
                            if (description) description.textContent = i18n.t("logs.emptyState.description");
                        } else {
                            if (title) title.textContent = i18n.t("logs.emptyState.noMatchesTitle");
                            if (description) description.textContent = i18n.t("logs.emptyState.noMatchesDescription");
                        }
                        return;
                    }

                    const existingEmpty = logsContainer.querySelector(".empty-state");
                    if (existingEmpty) existingEmpty.remove();

                    if (!preserve) {
                        displayedLogsCount = Math.min(logsPerLoad, filteredLogs.length);
                    } else {
                        if (displayedLogsCount === 0) {
                            displayedLogsCount = Math.min(logsPerLoad, filteredLogs.length);
                        }
                        displayedLogsCount = Math.min(displayedLogsCount, filteredLogs.length);
                    }
                    hasMoreLogs = displayedLogsCount < filteredLogs.length;

                    syncLogSlice();
                }

                // 타임스탬프 포맷
                function formatTimestamp(timestamp) {
                    const date = new Date(timestamp);
                    const now = new Date();
                    const diffMs = now - date;
                    const diffMinutes = Math.floor(diffMs / (1000 * 60));
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

                    if (diffMinutes < 1) {
                        return i18n.t("logs.timeAgo.justNow");
                    } else if (diffMinutes < 60) {
                        return diffMinutes === 1
                            ? i18n.t("logs.timeAgo.minuteAgo", { count: diffMinutes })
                            : i18n.t("logs.timeAgo.minutesAgo", { count: diffMinutes });
                    } else if (diffHours < 24) {
                        return diffHours === 1
                            ? i18n.t("logs.timeAgo.hourAgo", { count: diffHours })
                            : i18n.t("logs.timeAgo.hoursAgo", { count: diffHours });
                    } else if (diffDays < 7) {
                        return diffDays === 1
                            ? i18n.t("logs.timeAgo.dayAgo", { count: diffDays })
                            : i18n.t("logs.timeAgo.daysAgo", { count: diffDays });
                    } else {
                        return date.toLocaleString();
                    }
                }

                // 이벤트 리스너 - 무한 스크롤
                logsContainer.addEventListener("scroll", function () {
                    if (logsContainer.scrollTop + logsContainer.clientHeight >= logsContainer.scrollHeight - 50) {
                        loadMoreLogs();
                    }
                });

                backBtn.addEventListener("click", function () {
                    window.location.href = "dashboard.html";
                });

                // 로그 삭제 버튼 클릭
                clearLogsBtn.addEventListener("click", async function () {
                    if (confirm(i18n.t("logs.clearConfirm"))) {
                        try {
                            const result = await window.localkeys.logs.clear();
                            if (result.success) {
                                notificationManager.success(i18n.t("logs.notifications.cleared"));
                                allLogs = [];
                                filteredLogs = [];
                                renderLogs();
                            } else {
                                notificationManager.error(i18n.t("logs.notifications.failedToClear"));
                            }
                        } catch (error) {
                            notificationManager.error(i18n.t("logs.notifications.failedToClear"));
                        }
                    }
                });

                // 로그 내보내기 버튼 클릭
                exportLogsBtn.addEventListener("click", async function () {
                    try {
                        const result = await window.localkeys.logs.export();
                        if (result.success) {
                            notificationManager.success(i18n.t("logs.notifications.exported", { path: result.path }));
                        } else if (!result.cancelled) {
                            notificationManager.error(i18n.t("logs.notifications.failedToExport"));
                        }
                    } catch (error) {
                        notificationManager.error(i18n.t("logs.notifications.failedToExport"));
                    }
                });

                // 카테고리 필터 변경
                categoryFilter.addEventListener("change", function () {
                    currentCategory = categoryFilter.value;
                    applyFilters();
                });

                // 검색 입력
                searchInput.addEventListener("input", function () {
                    currentSearch = searchInput.value;
                    applyFilters();
                });

                // 자동 새로고침 설정 (15초마다) — 목록 DOM은 증분 갱신되어 스크롤·선택 상태 유지
                const autoRefreshInterval = setInterval(async () => {
                    if (document.visibilityState === "visible") {
                        await loadLogs({ preserveView: true });
                    }
                }, 15000);

                // 페이지가 보이지 않을 때는 자동 새로고침 중지
                document.addEventListener("visibilitychange", () => {
                    if (document.visibilityState === "hidden") {
                        clearInterval(autoRefreshInterval);
                    }
                });

                // 초기 로드
                loadLogs();
            });
        </script>
    </body>
</html>
